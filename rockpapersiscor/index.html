<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        let humanScore = 0;
let computerScore = 0;

function getComputerChoice() {
    let randomNum = Math.random();
    if (randomNum < 0.34) {
        return "rock";
    } else if (randomNum < 0.67) {
        return "paper";
    } else {
        return "scissors";
    }
}

function getHumanChoice() {
    let choice = prompt("Enter your choice: rock, paper or scissors");
    return choice.toLowerCase(); 
}

function playRound(humanChoice, computerChoice) {
    if (humanChoice === computerChoice) {
        console.log(`It's a TIE! You both chose ${humanChoice}`);
    } else if (humanChoice === "rock" && computerChoice === "scissors" ||
               humanChoice === "paper" && computerChoice === "rock" ||
               humanChoice === "scissors" && computerChoice === "paper") {
        console.log(`You won! ${humanChoice} beats ${computerChoice}`);
        humanScore++;
    } else {
        console.log(`Bot won! ${computerChoice} beats ${humanChoice}`);
        computerScore++;
    }
}

function playGame() {
    let n=prompt("Enter the number of rounds you want to play:");
    for (let i = 0; i < n; i++) {
        playRound(getHumanChoice(), getComputerChoice());
    }

    console.log(`--- FINAL SCORE ---`);
    console.log(`Human: ${humanScore} | Computer: ${computerScore}`);
    
    if (humanScore > computerScore) {
        console.log("CONGRATULATIONS! You won the match!");
    } else if (computerScore > humanScore) {
        console.log("GAME OVER. The bot defeated you.");
    } else {
        console.log("It's an ultimate TIE!");
    }
}

playGame();
    </script>
</body>
</html>
